<div class="full-screen-container">
    <div class="table-filter">
        <mat-form-field>
            <mat-label>Filter</mat-label>
            <input matInput (keyup)="dataSource.applyFilter($event)" placeholder="Filter" #input>
        </mat-form-field>
    </div>

    <div class="main-content no-overflow">
        @if (dataSource.isLoading) {
        <div class="loading-overlay">
            <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
        </div>
        }
        <div class="overflow">
            <table mat-table [dataSource]="dataSource" matSort>

                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Username </th>
                    <td mat-cell *matCellDef="let row"> {{row.username}} </td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Email </th>
                    <td mat-cell *matCellDef="let row"> {{row.email}} </td>
                </ng-container>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name </th>
                    <td mat-cell *matCellDef="let row"> {{row.name}} </td>
                </ng-container>

                <ng-container matColumnDef="disabled">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Disabled </th>
                    <td mat-cell *matCellDef="let row"> {{row.disabled}} </td>
                </ng-container>

                <ng-container matColumnDef="roles">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Roles </th>
                    <td mat-cell *matCellDef="let row"> {{row.roles}} </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef></th>
                    <td mat-cell *matCellDef="let row">
                        @if (currentUsername != row.username) {
                        <button mat-icon-button color="primary" (click)="editRow(row); $event.stopPropagation();"
                            matTooltip="Edit">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="primary"
                            (click)="changePasswordRow(row); $event.stopPropagation();"
                            matTooltip="Change user password">
                            <mat-icon>key</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteRow(row); $event.stopPropagation();"
                            matTooltip="Delete">
                            <mat-icon>delete</mat-icon>
                        </button>
                        }
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onClickRow(row)"
                    class="clickable">
                </tr>
            </table>
            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
        </div>
        <button mat-fab color="primary" [routerLink]="['/users', '__NEW__']">
            <mat-icon>add</mat-icon>
        </button>
    </div>

    <app-bottom-nav [showSignInOut]="true"></app-bottom-nav>
</div>
