<div class="layout-container-2 full-screen-container">
    @if (exercise) {
    <div class="part left vertically-centered">
        <div id="sentence">{{ exercise.target_sentence}}</div>
        @if (showHint) {
        <div id="hint">({{ exercise.target_hint}})</div>
        }
    </div>
    <div class="part right vertically-centered">
        <mat-radio-group id="answer" [(ngModel)]="answer" (change)="onAnswer($event)">
            @for(o of exercise.options; track $index; let i = $index) {
            <mat-radio-button value="{{i}}" [disabled]="disabledAnswer[i]">{{o}}</mat-radio-button>
            }
        </mat-radio-group>
    </div>
    }
</div>

<mat-toolbar color="primary" class="bottom-nav">
    <mat-nav-list class="horizontal">
        <a mat-list-item routerLink="/topics">
            <mat-icon matListItemIcon>home</mat-icon>
            <span matListItemTitle>Home</span>
        </a>
        <a mat-list-item (click)="showHint = true" i18n-matTooltip matTooltip="Show hint" [disabled]="showHint">
            <mat-icon matListItemIcon>help</mat-icon>
            <span matListItemTitle>Clue</span>
        </a>
        <a mat-list-item (click)="native = !native" i18n-matTooltip matTooltip="Switch interface language" [disabled]="true">
            <mat-icon matListItemIcon>g_translate</mat-icon>
            <span matListItemTitle>Translate</span>
        </a>
    </mat-nav-list>
</mat-toolbar>
