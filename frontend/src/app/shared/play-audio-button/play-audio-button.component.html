@if (isPlaying()) {
<button type="button" matIconButton (click)="pause()">
    <mat-icon>pause_circle</mat-icon>
</button>
} @else {
<button type="button" matIconButton (click)="play()">
    <mat-icon>play_circle</mat-icon>
</button>
}
@if (showGenerateButton()) {
<button type="button" matIconButton (click)="generate.emit()" matTooltip="Generate audio">
    <mat-icon>change_circle</mat-icon>
</button>
}
